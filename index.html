<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Suika Game Kawaii</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container">
      <div id="ui-layer">
        <div class="score-container">
          Score: <span id="score">0</span>
        </div>
        <div class="next-fruit-container">
          <div style="font-size: 14px; opacity: 0.8; margin-bottom: 2px;">Siguiente:</div>
          <div id="next-fruit-name" style="font-size: 16px; margin-bottom: 5px;"></div>
          <div id="next-fruit-preview"></div>
        </div>
      </div>
    </div>
    
    <div id="game-over-screen" class="hidden">
      <div class="game-over-modal">
        <h1>¡Juego Terminado!</h1>
        <p>Puntaje: <span id="final-score">0</span></p>
        
        <div id="submit-score-section">
          <input type="text" id="player-name" placeholder="Tu Nombre" maxlength="15" />
          <button id="submit-score-btn">Guardar Puntaje</button>
        </div>

        <div id="leaderboard-section">
          <h2>Top 5 Global</h2>
          <ul id="leaderboard-list">
            <li>Cargando...</li>
          </ul>
        </div>

        <button id="restart-button">Jugar de Nuevo</button>
      </div>
    </div>

    <!-- Start Overlay for Audio Policy -->
    <div id="start-screen">
      <div class="start-modal">
        <h1>🍉 Suika Kawaii</h1>
        <p>¡Une las frutas para llegar a la sandía!</p>
        <button id="start-game-btn">¡Empezar a Jugar!</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
