<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suika Game Clone</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container">
      <div id="ui-layer">
        <div class="score-container">
          Score: <span id="score">0</span>
        </div>
        <div class="next-fruit-container">
          Next: <div id="next-fruit-preview"></div>
        </div>
      </div>
    </div>
    
    <div id="game-over-screen" class="hidden">
      <div class="game-over-modal">
        <h1>Game Over</h1>
        <p>Score: <span id="final-score">0</span></p>
        
        <div id="submit-score-section">
          <input type="text" id="player-name" placeholder="Tu Nombre" maxlength="15" />
          <button id="submit-score-btn">Guardar Puntaje</button>
        </div>

        <div id="leaderboard-section">
          <h2>Top 5 Global</h2>
          <ul id="leaderboard-list">
            <li>Cargando...</li>
          </ul>
        </div>

        <button id="restart-button">Jugar de Nuevo</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
